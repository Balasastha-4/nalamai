services:
  postgres:
    image: postgres:16-alpine
    container_name: nalamai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nalamai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nalamai_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-nalamai_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - nalamai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nalamai} -d ${POSTGRES_DB:-nalamai_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nalamai_backend
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - POSTGRES_USER=${POSTGRES_USER:-nalamai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nalamai_dev_password}
      - POSTGRES_DB=${POSTGRES_DB:-nalamai_db}
      - SERVER_PORT=${SERVER_PORT:-8080}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-this-in-production}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    networks:
      - nalamai_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: nalamai_ai_service
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-AIzaSyCVeWlTzP1-UEDLsJqe7RaAK1ongTShV4Q}
      - BACKEND_API_URL=http://backend:8080
      - BACKEND_API_KEY=${BACKEND_API_KEY:-}
      - LOG_LEVEL=INFO
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080,http://localhost:5173
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    networks:
      - nalamai_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nalamai_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@nalamai.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - nalamai_network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  nalamai_network:
    driver: bridge
