server.port=${SERVER_PORT:8080}
server.address=0.0.0.0

# PostgreSQL Configuration
# Supports both:
# 1) Local backend + Docker PostgreSQL via POSTGRES_HOST/POSTGRES_PORT
# 2) Full JDBC override via DATABASE_URL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:nalamai_db}}
spring.datasource.username=${POSTGRES_USER:nalamai}
spring.datasource.password=${POSTGRES_PASSWORD:nalamai_dev_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
# Do not fail application startup if PostgreSQL container is still booting.
spring.datasource.hikari.initialization-fail-timeout=${DB_INIT_FAIL_TIMEOUT:-1}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.connection-test-query=SELECT 1

# Hibernate / JPA config
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-should-be-at-least-256-bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Spring Security - disable default security for local development testing
spring.security.user.name=${SECURITY_USER:admin}
spring.security.user.password=${SECURITY_PASSWORD:admin}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Logging
logging.level.org.hibernate.SQL=${LOG_SQL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_SQL_PARAMS:TRACE}
logging.level.com.nalamai.backend=${APP_LOG_LEVEL:DEBUG}
