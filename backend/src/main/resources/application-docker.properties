# Docker-specific PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:nalamai_db}
spring.datasource.username=${POSTGRES_USER:nalamai}
spring.datasource.password=${POSTGRES_PASSWORD:nalamai_dev_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Wait for PostgreSQL to be ready
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA configuration for Docker
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=INFO
logging.level.com.nalamai.backend=INFO
